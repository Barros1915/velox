<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velox WebSocket Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d; color: #f0f0f0; padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #5865f2; margin-bottom: 20px; text-align: center; }
        .status {
            padding: 10px; border-radius: 8px; margin-bottom: 20px;
            text-align: center; font-weight: bold;
        }
        .status.connected { background: #22c55e; color: #000; }
        .status.disconnected { background: #ef4444; color: #fff; }
        .status.connecting { background: #f59e0b; color: #000; }
        .messages {
            background: #1a1a1a; border-radius: 8px; padding: 15px;
            height: 300px; overflow-y: auto; margin-bottom: 20px;
            border: 1px solid #333;
        }
        .message {
            padding: 8px 12px; margin-bottom: 8px; border-radius: 8px;
            word-break: break-all;
        }
        .message.sent { background: #5865f2; margin-left: 50px; }
        .message.received { background: #22c55e; color: #000; margin-right: 50px; }
        .message.error { background: #ef4444; }
        .message.info { background: #333; font-size: 12px; text-align: center; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333;
            background: #1a1a1a; color: #fff; font-size: 16px;
        }
        input:focus { outline: none; border-color: #5865f2; }
        button {
            padding: 12px 24px; border-radius: 8px; border: none;
            background: #5865f2; color: #fff; font-size: 16px; cursor: pointer;
        }
        button:hover { background: #4752c4; }
        button:disabled { background: #333; cursor: not-allowed; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 Velox WebSocket Test</h1>
        
        <div id="status" class="status disconnected">Desconectado</div>
        
        <div class="controls">
            <button id="btnConnect" onclick="connect()">Conectar</button>
            <button id="btnDisconnect" onclick="disconnect()" disabled>Desconectar</button>
        </div>
        
        <div class="messages" id="messages"></div>
        
        <div class="input-group">
            <input type="text" id="msgInput" placeholder="Digite uma mensagem..." disabled>
            <button id="btnSend" onclick="sendMessage()" disabled>Enviar</button>
        </div>
    </div>

    <script>
        let ws = null;
        
        const status = document.getElementById('status');
        const messages = document.getElementById('messages');
        const msgInput = document.getElementById('msgInput');
        const btnConnect = document.getElementById('btnConnect');
        const btnDisconnect = document.getElementById('btnDisconnect');
        const btnSend = document.getElementById('btnSend');
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = msg;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function setStatus(state, text) {
            status.className = `status ${state}`;
            status.textContent = text;
        }
        
        function connect() {
            if (ws) {
                ws.close();
            }
            
            const wsUrl = 'ws://localhost:8000/ws/chat';
            log(`Conectando a ${wsUrl}...`, 'info');
            setStatus('connecting', 'Conectando...');
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                log('✅ Conectado!', 'info');
                setStatus('connected', 'Conectado');
                btnConnect.disabled = true;
                btnDisconnect.disabled = false;
                msgInput.disabled = false;
                btnSend.disabled = false;
                msgInput.focus();
            };
            
            ws.onmessage = (event) => {
                log(`📥 Recebido: ${event.data}`, 'received');
            };
            
            ws.onclose = (event) => {
                log(`❌ Desconectado (code: ${event.code})`, 'info');
                setStatus('disconnected', 'Desconectado');
                btnConnect.disabled = false;
                btnDisconnect.disabled = true;
                msgInput.disabled = true;
                btnSend.disabled = true;
                ws = null;
            };
            
            ws.onerror = (error) => {
                log(`⚠️ Erro: ${error}`, 'error');
                setStatus('disconnected', 'Erro');
            };
        }
        
        function disconnect() {
            if (ws) {
                log('Desconectando...', 'info');
                ws.close();
            }
        }
        
        function sendMessage() {
            const msg = msgInput.value.trim();
            if (!msg || !ws) return;
            
            log(`📤 Enviando: ${msg}`, 'sent');
            ws.send(msg);
            msgInput.value = '';
            msgInput.focus();
        }
        
        // Enter para enviar
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        log('🔌 Cliente WebSocket pronto. Clique em "Conectar".', 'info');
    </script>
</body>
</html>
