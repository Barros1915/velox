<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Icon circle -->
  <circle cx="40" cy="40" r="36" fill="url(#bg)" stroke="#1e40af" stroke-width="1.5"/>
  <circle cx="40" cy="40" r="32" fill="none" stroke="#1d4ed8" stroke-width="0.8" opacity="0.3"/>
  <!-- V bolt -->
  <path d="M 26 22 L 40 58 L 54 22" fill="none" stroke="url(#bolt)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="40" cy="40" r="2.5" fill="#93c5fd" opacity="0.9"/>
  <!-- Wordmark -->
  <text x="90" y="48" font-family="-apple-system,BlinkMacSystemFont,'Inter',sans-serif"
        font-size="36" font-weight="800" fill="url(#text-grad)" letter-spacing="-1">
    Velox
  </text>
  <!-- Tagline -->
  <text x="92" y="64" font-family="-apple-system,BlinkMacSystemFont,'Inter',sans-serif"
        font-size="11" font-weight="400" fill="#475569" letter-spacing="0.5">
    Fast Python Web Framework
  </text>
</svg>
