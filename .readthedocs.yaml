# Read the Docs Configuration for Velox Framework
# ==================================================
# https://docs.readthedocs.io/en/stable/config-file/index.html

# Version of the config file
version: 2

# Build documentation in the docs/ directory
build:
  os: ubuntu-lts-latest
  tools:
    python: "3.9"
  commands:
    - sphinx-build -b html docs/source docs/build/html

# Python project
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dev

# Sphinx configuration
sphinx:
  builder: html
  configuration: docs/source/conf.py

# Build HTML and don't build PDF/ePub
formats:
  - html