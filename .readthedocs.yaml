version: 2

build:
  os: ubuntu-lts-latest
  tools:
    python: "3.9"
  commands:
    - pip install sphinx sphinx_rtd_theme
    - sphinx-build -b html docs/source $READTHEDOCS_OUTPUT/html/

python:
  install:
    - method: pip
      path: .

sphinx:
  builder: html
  configuration: docs/source/conf.py