# Read the Docs Configuration for Velox Framework
# ==================================================
version: 2

build:
  os: ubuntu-lts-latest
  tools:
    python: "3.9"
  commands:
    - sphinx-build -b html docs/source docs/build/html

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dev

sphinx:
  builder: html
  configuration: docs/source/conf.py

formats:
  - html