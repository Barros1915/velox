<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#1e40af" stroke-width="2"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.4"/>
  <!-- Lightning bolt V shape -->
  <path d="M 65 55 L 100 145 L 135 55" fill="none" stroke="url(#bolt)" stroke-width="10"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Center dot -->
  <circle cx="100" cy="100" r="5" fill="#93c5fd" opacity="0.8"/>
  <!-- Speed lines -->
  <line x1="40" y1="100" x2="58" y2="100" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="142" y1="100" x2="160" y2="100" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="44" y1="85" x2="60" y2="85" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="140" y1="115" x2="156" y2="115" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>
